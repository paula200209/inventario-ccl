<div class="movimiento-container">
  <div class="header">
    <button class="btn-volver" (click)="volver()">← Volver al inventario</button>
    <h2>Registrar movimiento</h2>
  </div>

  <div class="card">
    <div class="form-group">
      <label>Producto <span class="required">*</span></label>
      <select [(ngModel)]="productoId" [class.input-error]="error && !productoId">
        <option [ngValue]="null" disabled>Selecciona un producto</option>
        <option *ngFor="let p of productos" [ngValue]="p.id">
          {{ p.nombre }} (Stock: {{ p.cantidad }})
        </option>
      </select>
    </div>

    <div class="form-group">
      <label>Tipo de movimiento <span class="required">*</span></label>
      <div class="tipo-options">
        <label class="tipo-label" [class.selected]="tipo === 'entrada'">
          <input type="radio" [(ngModel)]="tipo" value="entrada" /> Entrada
        </label>
        <label class="tipo-label" [class.selected]="tipo === 'salida'">
          <input type="radio" [(ngModel)]="tipo" value="salida" /> Salida
        </label>
      </div>
    </div>

    <div class="form-group">
      <label>Cantidad <span class="required">*</span></label>
      <input
        type="number"
        [(ngModel)]="cantidad"
        placeholder="0"
        min="1"
        [class.input-error]="error && !cantidad"
      />
    </div>

    <div class="form-group">
      <label>Observación <span class="opcional">(opcional)</span></label>
      <input
        type="text"
        [(ngModel)]="observacion"
        placeholder="Ej: Ingreso de mercancía nueva"
      />
    </div>

    <p class="error-msg" *ngIf="error">{{ error }}</p>
    <p class="success-msg" *ngIf="mensaje">{{ mensaje }}</p>

    <button (click)="registrar()" [disabled]="cargando">
      {{ cargando ? 'Registrando...' : 'Registrar movimiento' }}
    </button>
  </div>
</div>
